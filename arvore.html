    <script>
    (function(){
      'use strict';
      const DB = window.GedcomDB;
      const T = window.TopolaLib;

      /* ── Helpers ──────────────────────────────────────────────────────── */
      const MONTHS_MAP = {JAN:1,FEB:2,MAR:3,APR:4,MAY:5,JUN:6,JUL:7,AUG:8,SEP:9,OCT:10,NOV:11,DEC:12};
      const MONTHS = ['','JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
      const QUAL_TO_GED = {'Antes de':'BEF','Depois de':'AFT','Cerca de':'ABT'};
      const GED_TO_QUAL = {BEF:'Antes de',AFT:'Depois de',ABT:'Cerca de',EST:'Cerca de'};
      function _esc(s){ return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
      function buildGedcomDate(day,month,year,qualifier){
        let p=[];
        if(qualifier && qualifier!=='Exatamente'){ p.push(QUAL_TO_GED[qualifier]||qualifier); }
        if(day) p.push(String(day));
        if(month) p.push(MONTHS[month]||'');
        if(year) p.push(String(year));
        return p.join(' ');
      }
      function parseGedcomDate(s){
        if(!s) return {};
        const tokens=s.toUpperCase().split(/\s+/);
        let q=null,d=null,m=null,y=null;
        for(const t of tokens){
          if(GED_TO_QUAL[t]) q=GED_TO_QUAL[t];
          else if(MONTHS_MAP[t]) m=MONTHS_MAP[t];
          else if(/^\d{3,4}$/.test(t)) y=parseInt(t);
          else if(/^\d{1,2}$/.test(t)&&!d) d=parseInt(t);
        }
        return {day:d,month:m,year:y,qualifier:q};
      }

      function parseGedcomDateToTopola(dateStr){
        if(!dateStr) return undefined;
        const tokens=dateStr.toUpperCase().split(/\s+/);
        let day,month,year;
        for(const t of tokens){
          if(MONTHS_MAP[t]) month=MONTHS_MAP[t];
          else if(/^\d{3,4}$/.test(t)) year=parseInt(t);
          else if(/^\d{1,2}$/.test(t)&&!day) day=parseInt(t);
        }
        if(!year&&!month&&!day) return undefined;
        return {date:{day,month,year}};
      }

      /* ── Path / kinship filter ────────────────────────────────────── */
      function computePathFilter(fromId, toId) {
        if (!fromId || !toId || fromId === toId) return null;
        // Use only non-deleted records so deleted entities never pollute the path
        const allIndis = DB.getIndividuals();
        const allFams  = DB.getFamilies();
        const indiIdSet = new Set(allIndis.map(function(i){ return i.id; }));
        const famIdSet  = new Set(allFams.map(function(f){ return f.id; }));
        const adj = new Map();
        function addEdge(a, b) {
          if (!a || !b) return;
          if (!adj.has(a)) adj.set(a, new Set());
          if (!adj.has(b)) adj.set(b, new Set());
          adj.get(a).add(b); adj.get(b).add(a);
        }
        // Build bipartite graph: person <-> family
        // Use FAMILY records as the authoritative source for all connections
        allFams.forEach(function(fam) {
          if (fam.husb && indiIdSet.has(fam.husb)) addEdge(fam.id, fam.husb);
          if (fam.wife && indiIdSet.has(fam.wife)) addEdge(fam.id, fam.wife);
          (fam.children || []).forEach(function(cid) {
            if (indiIdSet.has(cid)) addEdge(fam.id, cid);
          });
        });
        // Also add edges from individual famc/fams refs pointing to valid families
        allIndis.forEach(function(indi) {
          const famcArr = Array.isArray(indi.famc) ? indi.famc : (indi.famc ? [indi.famc] : []);
          famcArr.forEach(function(fid) { if (famIdSet.has(fid)) addEdge(indi.id, fid); });
          (indi.fams || []).forEach(function(fid) { if (famIdSet.has(fid)) addEdge(indi.id, fid); });
        });
        const visited = new Map();
        visited.set(fromId, null);
        const queue = [fromId];
        let found = false;
        outer: while (queue.length > 0) {
          const node = queue.shift();
          const nbrs = adj.get(node) || new Set();
          for (const nb of nbrs) {
            if (!visited.has(nb)) {
              visited.set(nb, node);
              if (nb === toId) { found = true; break outer; }
              queue.push(nb);
            }
          }
        }
        if (!found) return null;
        const path = [];
        let cur = toId;
        while (cur !== null && cur !== undefined) { path.unshift(cur); cur = visited.get(cur); }
        const indiSet = new Set(), famSet = new Set();
        path.forEach(function(id) { if (indiIdSet.has(id)) indiSet.add(id); else famSet.add(id); });

        // Build an index for quick lookups
        const famById = {};
        allFams.forEach(function(f){ famById[f.id] = f; });

        // Expand every family in famSet: add any parent (husb/wife) that is not yet
        // in indiSet.  This is needed for two cases:
        //   1. "Junction" (sibling-path): the BFS crossed a shared famc family without
        //      visiting the parents (2+ children in path, parents = common ancestor).
        //   2. "In-law" paths: the BFS crossed a fams family via a spouse link, so one
        //      spouse is on the path but the other parent is not yet included.  We must
        //      add all parents so the chart can root at the true common ancestor and
        //      render the full connecting sub-tree.
        const validIndiIdSet = new Set(allIndis.map(function(i){ return i.id; }));
        famSet.forEach(function(fid) {
          const fam = famById[fid];
          if (!fam) return;
          if (fam.husb && validIndiIdSet.has(fam.husb) && !indiSet.has(fam.husb)) indiSet.add(fam.husb);
          if (fam.wife && validIndiIdSet.has(fam.wife) && !indiSet.has(fam.wife)) indiSet.add(fam.wife);
        });

        // Also include the parent's own parents-family (famc) so the chart connects
        // them to their own line when present
        indiSet.forEach(function(pid) {
          const indi = allIndis.find(function(i){ return i.id === pid; });
          if (!indi) return;
          const famcArr = Array.isArray(indi.famc) ? indi.famc : (indi.famc ? [indi.famc] : []);
          // Only add it if it would be useful to anchor the root (keep tree small)
          famcArr.forEach(function(fid) { /* intentionally not added — keep scope tight */ });
        });

        // Now find the startId: the best root for the sub-tree that shows the
        // full connecting path.  Among individuals NOT listed as children in any
        // path-family (i.e. potential roots), prefer the true common ancestor —
        // the person who is a parent in the family with the MOST path-children.
        // This ensures in-law paths root at the grandparent (branching node)
        // rather than at a "filler spouse" who was only added for completeness.
        const childrenInPath = new Set();
        famSet.forEach(function(fid) {
          const fam = famById[fid];
          if (!fam) return;
          (fam.children || []).forEach(function(cid){ if (indiSet.has(cid)) childrenInPath.add(cid); });
        });
        let startId = null;
        let fallbackStartId = null;
        let bestScore = -1;
        for (const pid of indiSet) {
          if (childrenInPath.has(pid)) continue;
          if (pid === fromId) {
            if (!fallbackStartId) fallbackStartId = pid;
            continue;
          }
          // Score: how many path-children does this person parent across all path-families?
          var score = 0;
          famSet.forEach(function(fid) {
            var fam = famById[fid];
            if (!fam) return;
            if (fam.husb === pid || fam.wife === pid) {
              (fam.children || []).forEach(function(cid) {
                if (indiSet.has(cid)) score++;
              });
            }
          });
          if (score > bestScore) { bestScore = score; startId = pid; }
        }
        if (!startId) startId = fallbackStartId || Array.from(indiSet)[0];
        return { indiSet: indiSet, famSet: famSet, startId: startId };
      }

      /* ── Build Topola-compatible JSON ─────────────────────────────────── */
      function buildTopolaJson(){
        const indis=_pathFilter?DB.getIndividuals().filter(function(i){return _pathFilter.indiSet.has(i.id);}):DB.getIndividuals();
        const fams=_pathFilter?DB.getFamilies().filter(function(f){return _pathFilter.famSet.has(f.id);}):DB.getFamilies();
        // Build a set of valid (non-deleted) family IDs so we can filter refs
        const validFamIds=new Set(fams.map(f=>f.id));
        const validIndiIds=new Set(indis.map(i=>i.id));
        const tIndis=indis.map(indi=>{
          const birth=DB.getBirthEvent(indi);
          const death=DB.getDeathEvent(indi);
          const thumb=DB.getThumbnailForPerson(indi.id);
          // In path mode derive famc/fams from family records (source of truth)
          let famcVal, famsVal;
          if(_pathFilter){
            // famc: any family in famMap that lists indi as a child
            famcVal = fams.find(function(f){ return (f.children||[]).includes(indi.id); });
            famcVal = famcVal ? famcVal.id : undefined;
            // fams: any family in famMap that lists indi as husb or wife
            famsVal = fams.filter(function(f){ return f.husb===indi.id||f.wife===indi.id; }).map(function(f){return f.id;});
          } else {
            famcVal=(indi.famc&&validFamIds.has(indi.famc))?indi.famc:undefined;
            famsVal=(indi.fams||[]).filter(fid=>validFamIds.has(fid));
          }
          return {
            id: indi.id,
            firstName: DB.getGivenName(indi)||undefined,
            lastName: DB.getSurname(indi)||undefined,
            sex: indi.sex||undefined,
            famc: famcVal,
            fams: famsVal.length?famsVal:undefined,
            birth: birth?{...parseGedcomDateToTopola(birth.date),place:birth.place||undefined}:undefined,
            death: death?{...parseGedcomDateToTopola(death.date),place:death.place||undefined}:undefined,
            images: thumb?[{url:thumb,title:''}]:undefined
          };
        });
        const tFams=fams.map(fam=>{
          const marr=(fam.events||[]).find(e=>e.type==='MARR');
          // Filter out refs to deleted/missing individuals
          const children=(fam.children||[]).filter(cid=>validIndiIds.has(cid));
          return {
            id: fam.id,
            husb: (fam.husb&&validIndiIds.has(fam.husb))?fam.husb:undefined,
            wife: (fam.wife&&validIndiIds.has(fam.wife))?fam.wife:undefined,
            children: children.length?children:undefined,
            marriage: marr?{...parseGedcomDateToTopola(marr.date),place:marr.place||undefined}:undefined
          };
        });
        return {indis:tIndis,fams:tFams};
      }

      /* ── ViewBox pan/zoom state ──────────────────────────────────────── */
      let _vb={x:0,y:0,w:800,h:600};
      let _chartSize=[0,0];
      let _focusPt=[0,0];
      let _pathFilter=null; // {indiSet:Set, famSet:Set} when in kinship-path mode

      function _applyViewBox(){
        document.getElementById('topolaSvg').setAttribute('viewBox',`${_vb.x} ${_vb.y} ${_vb.w} ${_vb.h}`);
      }

      function _zoomViewBox(factor, cx, cy){
        // cx, cy: centre point in SVG display coords (defaults to viewBox centre)
        const svgEl=document.getElementById('topolaSvg');
        const rect=svgEl.getBoundingClientRect();
        if(cx===undefined) cx=rect.width/2;
        if(cy===undefined) cy=rect.height/2;
        // convert display coords → viewBox coords
        const scaleX=_vb.w/rect.width, scaleY=_vb.h/rect.height;
        const vbCx=_vb.x+cx*scaleX, vbCy=_vb.y+cy*scaleY;
        _vb.w*=factor; _vb.h*=factor;
        _vb.x=vbCx-cx*scaleX*factor;
        _vb.y=vbCy-cy*scaleY*factor;
        _applyViewBox();
      }

      function _centerViewBox(svgX, svgY){
        const svgEl=document.getElementById('topolaSvg');
        const rect=svgEl.getBoundingClientRect();
        _vb.x=svgX-_vb.w/2; _vb.y=svgY-_vb.h/2;
        _applyViewBox();
      }

      function _fitViewBox(){
        _vb.x=0; _vb.y=0; _vb.w=_chartSize[0]; _vb.h=_chartSize[1];
        _applyViewBox();
      }

      /* Pointer-based pan */
      (function _initPan(){
        const svgEl=()=>document.getElementById('topolaSvg');
        let panStart=null;
        document.addEventListener('pointerdown',e=>{
          if(!e.target.closest('#topolaWrap')||e.target.closest('button')) return;
          panStart={px:e.clientX,py:e.clientY,vbx:_vb.x,vby:_vb.y};
          svgEl().classList.add('panning');
          e.currentTarget.setPointerCapture&&e.currentTarget.setPointerCapture(e.pointerId);
        });
        document.addEventListener('pointermove',e=>{
          if(!panStart) return;
          const svgR=svgEl().getBoundingClientRect();
          const sx=_vb.w/svgR.width, sy=_vb.h/svgR.height;
          _vb.x=panStart.vbx-(e.clientX-panStart.px)*sx;
          _vb.y=panStart.vby-(e.clientY-panStart.py)*sy;
          _applyViewBox();
        });
        document.addEventListener('pointerup',()=>{panStart=null; svgEl()&&svgEl().classList.remove('panning');});
        document.addEventListener('wheel',e=>{
          if(!e.target.closest('#topolaWrap')) return;
          e.preventDefault();
          const svgR=svgEl().getBoundingClientRect();
          const cx=e.clientX-svgR.left, cy=e.clientY-svgR.top;
          _zoomViewBox(e.deltaY>0?1.15:1/1.15, cx, cy);
        },{passive:false});
      })();

      /* ── Chart type preference (localStorage) ──────────────────────────── */
      const CHART_TYPE_KEY='myLineage_chartType';
      function getChartType(){
        return localStorage.getItem(CHART_TYPE_KEY)||'donatso';
      }
      function setChartType(type){
        localStorage.setItem(CHART_TYPE_KEY,type);
        document.querySelectorAll('#chartTypeBtns .chart-type-btn').forEach(btn=>{
          btn.classList.toggle('active', btn.dataset.type===type);
        });
      }
      // Bind button clicks
      document.getElementById('chartTypeBtns').addEventListener('click',function(e){
        const btn=e.target.closest('.chart-type-btn');
        if(!btn) return;
        setChartType(btn.dataset.type);
        const id=_getSelectedOrFocusId ? _getSelectedOrFocusId() : null;
        renderChart(id);
      });
      // Init button state
      setChartType(getChartType());

      /* ── Chart rendering ──────────────────────────────────────────────── */
      let chartHandle=null;

      const CHART_TYPES={
        hourglass: T.HourglassChart,
        relatives: T.RelativesChart,
        fancy: T.FancyChart
      };

      /* ── Build Donatso family-chart data ──────────────────────────────── */
      function buildFamilyChartData(){
        const indis=_pathFilter?DB.getIndividuals().filter(function(i){return _pathFilter.indiSet.has(i.id);}):DB.getIndividuals();
        const fams=_pathFilter?DB.getFamilies().filter(function(f){return _pathFilter.famSet.has(f.id);}):DB.getFamilies();
        const famMap={};
        fams.forEach(f=>famMap[f.id]=f);
        const validIndiIds=new Set(indis.map(i=>i.id));

        // In path mode derive connections from family records (source of truth),
        // not from individual back-refs which can be asymmetric.
        // Build per-person rels keyed by id.
        const relsMap={};
        indis.forEach(function(i){ relsMap[i.id]={parents:[],spouses:[],children:[]}; });

        if(_pathFilter){
          // Family-authoritative: iterate famMap and wire up everyone
          Object.values(famMap).forEach(function(fam){
            const husb=fam.husb&&validIndiIds.has(fam.husb)?fam.husb:null;
            const wife=fam.wife&&validIndiIds.has(fam.wife)?fam.wife:null;
            const chn=(fam.children||[]).filter(function(c){return validIndiIds.has(c);});
            // spouses link each other
            if(husb&&wife){
              if(!relsMap[husb].spouses.includes(wife)) relsMap[husb].spouses.push(wife);
              if(!relsMap[wife].spouses.includes(husb)) relsMap[wife].spouses.push(husb);
            }
            // parents link → children
            chn.forEach(function(cid){
              if(husb&&!relsMap[cid].parents.includes(husb)) relsMap[cid].parents.push(husb);
              if(wife&&!relsMap[cid].parents.includes(wife)) relsMap[cid].parents.push(wife);
              if(husb&&!relsMap[husb].children.includes(cid)) relsMap[husb].children.push(cid);
              if(wife&&!relsMap[wife].children.includes(cid)) relsMap[wife].children.push(cid);
            });
          });
        } else {
          // Normal mode: use individual back-refs (fast, consistent for full dataset)
          // Build famc index for cross-checking children
          const famcMap={};
          indis.forEach(function(i){ if(i.famc) famcMap[i.id]=i.famc; });
          indis.forEach(function(indi){
            const r=relsMap[indi.id];
            if(indi.famc&&famMap[indi.famc]){
              const fam=famMap[indi.famc];
              if(fam.husb&&validIndiIds.has(fam.husb)) r.parents.push(fam.husb);
              if(fam.wife&&validIndiIds.has(fam.wife)) r.parents.push(fam.wife);
            }
            (indi.fams||[]).forEach(function(famId){
              const fam=famMap[famId]; if(!fam) return;
              if(fam.husb&&fam.husb!==indi.id&&validIndiIds.has(fam.husb)&&!r.spouses.includes(fam.husb)) r.spouses.push(fam.husb);
              if(fam.wife&&fam.wife!==indi.id&&validIndiIds.has(fam.wife)&&!r.spouses.includes(fam.wife)) r.spouses.push(fam.wife);
              (fam.children||[]).forEach(function(cid){
                if(!validIndiIds.has(cid)||r.children.includes(cid)) return;
                // Only claim child if the child's famc actually points to this family
                if(famcMap[cid]===famId) r.children.push(cid);
              });
            });
          });
        }

        return indis.map(function(indi){
          const birth=DB.getBirthEvent(indi),death=DB.getDeathEvent(indi);
          const thumb=DB.getThumbnailForPerson(indi.id);
          return {
            id: indi.id,
            data: {
              gender: indi.sex==='F'?'F':'M',
              first_name: DB.getGivenName(indi)||'',
              last_name: DB.getSurname(indi)||'',
              birthday: birth&&birth.date?birth.date:'',
              deathday: death&&death.date?death.date:'',
              avatar: thumb||undefined
            },
            rels: relsMap[indi.id]
          };
        });
      }

      let f3ChartHandle=null;

      /**
       * Build a lookup of "past relationship" pairs.
       * For each person with multiple spouse families that have relationshipOrder set,
       * the family with the highest order is "current" — all others are "past".
       * Returns a Set of keys "idA|idB" (sorted) for past relationships.
       */
      function _buildPastRelationshipPairs(famMap, validIndiIds){
        const pastPairs=new Set();
        // Group families by each person
        const famsByPerson={};
        Object.values(famMap).forEach(function(fam){
          if(fam.husb&&validIndiIds.has(fam.husb)){
            if(!famsByPerson[fam.husb]) famsByPerson[fam.husb]=[];
            famsByPerson[fam.husb].push(fam);
          }
          if(fam.wife&&validIndiIds.has(fam.wife)){
            if(!famsByPerson[fam.wife]) famsByPerson[fam.wife]=[];
            famsByPerson[fam.wife].push(fam);
          }
        });
        Object.keys(famsByPerson).forEach(function(pid){
          var personFams=famsByPerson[pid].filter(function(f){
            return (f.husb&&f.husb!==pid&&validIndiIds.has(f.husb))||(f.wife&&f.wife!==pid&&validIndiIds.has(f.wife));
          });
          if(personFams.length<2) return;
          // Check if any have relationshipOrder set
          var anyOrdered=personFams.some(function(f){ return f.relationshipOrder; });
          if(!anyOrdered) return;
          // Find the current (highest order) relationship
          var maxOrder=0;
          personFams.forEach(function(f){ if(f.relationshipOrder&&f.relationshipOrder>maxOrder) maxOrder=f.relationshipOrder; });
          personFams.forEach(function(f){
            if(!f.relationshipOrder||f.relationshipOrder<maxOrder){
              var spouseId=(f.husb===pid)?f.wife:f.husb;
              if(spouseId){
                var key=[pid,spouseId].sort().join('|');
                pastPairs.add(key);
              }
            }
          });
        });
        return pastPairs;
      }

      /**
       * Build a map of couple-key → relationshipOrder for ALL ordered families.
       * Key format: "idA|idB" (sorted).
       */
      function _buildRelOrderMap(famMap, validIndiIds){
        var orderMap={}; // key → {famId, order}
        Object.values(famMap).forEach(function(fam){
          if(!fam.husb||!fam.wife) return;
          if(!validIndiIds.has(fam.husb)||!validIndiIds.has(fam.wife)) return;
          if(fam.relationshipOrder){
            var key=[fam.husb,fam.wife].sort().join('|');
            orderMap[key]={famId:fam.id, order:fam.relationshipOrder};
          }
        });
        return orderMap;
      }

      /**
       * After Donatso renders, walk SVG link paths and:
       * 1) Apply dashed + transparent styling to past-relationship links
       *    (directly via attributes, because D3 inline styles override CSS).
       * 2) Add relationship-order labels between spouse cards.
       */
      function _applyPastRelationshipStyles(fcWrap){
        var fams=DB.getFamilies();
        var famMap={};
        fams.forEach(function(f){ famMap[f.id]=f; });
        var validIndiIds=new Set(DB.getIndividuals().map(function(i){ return i.id; }));
        var pastPairs=_buildPastRelationshipPairs(famMap, validIndiIds);
        var relOrderMap=_buildRelOrderMap(famMap, validIndiIds);

        // Build set of children from past-relationship families
        var pastChildIds=new Set();
        if(pastPairs.size){
          Object.values(famMap).forEach(function(fam){
            var husb=fam.husb, wife=fam.wife;
            if(!husb||!wife) return;
            var key=[husb,wife].sort().join('|');
            if(pastPairs.has(key)){
              (fam.children||[]).forEach(function(cid){ pastChildIds.add(cid); });
            }
          });
        }

        var svgEl=fcWrap.querySelector('svg.main_svg')||fcWrap.querySelector('svg');
        if(!svgEl) return;
        var linksView=svgEl.querySelector('.links_view');
        if(!linksView) return;

        // ── Style past-relationship links ──
        svgEl.querySelectorAll('path.link').forEach(function(pathEl){
          var d=pathEl.__data__;
          if(!d) return;
          // Reset any previously applied styles
          pathEl.removeAttribute('stroke-dasharray');
          pathEl.style.removeProperty('stroke-opacity');

          if(d.spouse && pastPairs.size){
            var srcId=d.source&&d.source.data?d.source.data.id:null;
            var tgtId=d.target&&d.target.data?d.target.data.id:null;
            if(srcId&&tgtId){
              var key=[srcId,tgtId].sort().join('|');
              if(pastPairs.has(key)){
                pathEl.setAttribute('stroke-dasharray','6 4');
                pathEl.style.strokeOpacity='0.35';
              }
            }
          } else if(d.curve&&!d.is_ancestry&&d.target && pastPairs.size){
            var childId=d.target&&d.target.data?d.target.data.id:null;
            if(childId&&pastChildIds.has(childId)){
              var parents=d.source;
              if(Array.isArray(parents)&&parents.length===2){
                var p1=parents[0]&&parents[0].data?parents[0].data.id:null;
                var p2=parents[1]&&parents[1].data?parents[1].data.id:null;
                if(p1&&p2){
                  var pkey=[p1,p2].sort().join('|');
                  if(pastPairs.has(pkey)){
                    pathEl.setAttribute('stroke-dasharray','6 4');
                    pathEl.style.strokeOpacity='0.35';
                  }
                }
              }
            }
          }
        });

        // ── Add/update relationship-order labels between spouse cards ──
        // Remove existing labels first
        linksView.querySelectorAll('.rel-order-group').forEach(function(g){ g.remove(); });

        if(!Object.keys(relOrderMap).length) return;

        svgEl.querySelectorAll('path.link').forEach(function(pathEl){
          var d=pathEl.__data__;
          if(!d||!d.spouse) return;
          var srcId=d.source&&d.source.data?d.source.data.id:null;
          var tgtId=d.target&&d.target.data?d.target.data.id:null;
          if(!srcId||!tgtId) return;
          var key=[srcId,tgtId].sort().join('|');
          var info=relOrderMap[key];
          if(!info) return;

          // Position: midpoint between the two spouse cards
          var sx=d.source.x, sy=d.source.y;
          var tx=d.target.x, ty=d.target.y;
          var mx=(sx+tx)/2, my=(sy+ty)/2;

          var ns='http://www.w3.org/2000/svg';
          var g=document.createElementNS(ns,'g');
          g.setAttribute('class','rel-order-group');
          g.setAttribute('transform','translate('+mx+','+(my-10)+')');

          var text=document.createElementNS(ns,'text');
          text.setAttribute('class','rel-order-label');
          text.setAttribute('y','0');
          text.setAttribute('x','0');
          text.textContent=info.order+'\u00aa';
          g.appendChild(text);
          linksView.appendChild(g);
        });
      }

      /**
       * Refresh chart data in-place after a create/edit/delete, preserving the
       * current zoom level and pan position exactly.
       *
       * Donatso: calls f3ChartHandle.updateData() + updateTree({tree_position:'inherit'})
       *   — zero DOM destruction, the library diffs and patches the existing SVG.
       * Topola:  snapshots the viewBox first, does a full SVG re-render, then
       *   restores the snapshot so the viewport does not move.
       */
      function refreshChartInPlace(){
        const selectedType = getChartType();

        if(selectedType === 'donatso'){
          renderChart(_getSelectedOrFocusId(), true);
          return;
        }

        // Topola: snapshot viewBox, re-render, restore
        const savedVb = {..._vb};
        const focusId = _getSelectedOrFocusId();
        renderChart(focusId);   // normal render (sets new _vb)
        _vb = savedVb;          // override with saved state
        _applyViewBox();
      }

      function _updateEmptyState() {
        var hasData = DB.getIndividuals().length > 0;
        document.getElementById('openBookBtn').style.display = hasData ? '' : 'none';
        document.getElementById('resetFocusBtn').style.display = hasData ? '' : 'none';
        document.getElementById('createFirstPersonBtn').style.display = hasData ? 'none' : '';
        var emptyEl = document.getElementById('emptyStateTree');
        if (emptyEl) emptyEl.style.display = hasData ? 'none' : 'flex';
        var toolbarEl = document.querySelector('.chart-toolbar');
        if (toolbarEl) toolbarEl.style.display = hasData ? '' : 'none';
        var topolaEl = document.getElementById('topolaWrap');
        if (topolaEl) topolaEl.style.display = hasData ? '' : 'none';
        var fcEl = document.getElementById('familyChartWrap');
        if (fcEl && !hasData) fcEl.style.display = 'none';
        var legendEl = document.querySelector('.legend');
        if (legendEl) legendEl.style.display = hasData ? '' : 'none';
      }

      function renderChart(startIndi, preserveView){
        if (!DB.getIndividuals().length) { _updateEmptyState(); return; }
        const selectedType=getChartType();

        /* ── Donatso Family Chart ──────────────────────────────────────── */
        if(selectedType==='donatso'){
          document.getElementById('topolaWrap').style.display='none';
          const fcWrap=document.getElementById('familyChartWrap');

          // Capture the exact DOM transform string of the main <g> BEFORE
          // destroying the chart — most reliable source of truth for the
          // current pan/zoom state regardless of d3-zoom internal state.
          let savedTransform=null;
          if(preserveView){
            const oldSvg=fcWrap.querySelector('svg.main_svg')||fcWrap.querySelector('svg');
            const oldG=oldSvg&&(oldSvg.querySelector(':scope > g')||oldSvg.querySelector('g'));
            if(oldG) savedTransform=oldG.getAttribute('transform')||null;
            // Fallback: reconstruct from __zoom if DOM transform is absent
            if(!savedTransform && oldSvg && oldSvg.__zoom){
              const z=oldSvg.__zoom;
              if(z.k!==1||z.x!==0||z.y!==0)
                savedTransform='translate('+z.x+','+z.y+') scale('+z.k+')';
            }
          }

          fcWrap.style.display='';
          fcWrap.innerHTML='';
          f3ChartHandle=null;
          const fcData=buildFamilyChartData();
          if(!fcData.length){
            fcWrap.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#888;font-size:16px;">Sem dados. Adicione pessoas no Cadastro.</div>';
            return;
          }
          const validFcIds=new Set(fcData.map(d=>d.id));
          if(!startIndi||!validFcIds.has(startIndi)) startIndi=fcData[0].id;
          try{
            const F3=window.F3Lib;

            // Determine the best root to render.  When the focus person has
            // siblings (their parent has multiple children), we render the
            // tree starting from the PARENT so that all siblings and their
            // full descendant sub-trees are visible.  We still remember the
            // original focus person so we can centre the viewport on them.
            const focusDatumForSiblings=fcData.find(function(d){ return d.id===startIndi; });
            let renderRoot=startIndi;
            let visibleFocusId=startIndi; // person the viewport should centre on
            if(focusDatumForSiblings && focusDatumForSiblings.rels.parents.length>0){
              const parentId=focusDatumForSiblings.rels.parents[0];
              const parentDatum=fcData.find(function(d){ return d.id===parentId; });
              if(parentDatum && parentDatum.rels.children.length>1){
                // Focus person has siblings → root at parent so siblings and
                // their descendants all appear in the same tree.
                renderRoot=parentId;
              }
            }

            f3ChartHandle=F3.createChart(fcWrap, fcData);
            const card=f3ChartHandle.setCardSvg();
            card.setCardDisplay([
              function(d){ return [d.data.first_name, d.data.last_name].filter(Boolean).join(' ')||'—'; },
              function(d){ return d.data.birthday ? '\u2605 '+d.data.birthday : ''; },
              function(d){ return d.data.deathday ? '\u271D '+d.data.deathday : ''; }
            ]);
            card.setCardDim({w:230, h:80, text_x:75, text_y:12, img_w:62, img_h:72, img_x:4, img_y:4});
            card.setMiniTree(false);
            card.setOnCardClick(function(e,d){
              if(d&&d.data&&d.data.id) openDrawer('edit',d.data.id);
            });
            // Always let the library do its initial layout (valid tree_position value).
            // We override the transform afterwards via double-rAF so it runs AFTER
            // any d3 transition frames that updateTree may have scheduled.
            f3ChartHandle
              .updateMainId(renderRoot)
              .updateTree({initial:true, tree_position:'main_to_middle'});
            requestAnimationFrame(function(){
              requestAnimationFrame(function(){
                const newSvg=fcWrap.querySelector('svg.main_svg')||fcWrap.querySelector('svg');
                if(!newSvg) return;
                const mainG=newSvg.querySelector(':scope > g')||newSvg.querySelector('g');
                if(!mainG) return;
                if(savedTransform){
                  mainG.setAttribute('transform', savedTransform);
                  // Keep d3-zoom internal state coherent with what we just applied
                  const m=savedTransform.match(/translate\(\s*([^,]+),\s*([^)]+)\)[\s,]*scale\(\s*([^)]+)\s*\)/);
                  if(m) newSvg.__zoom={x:parseFloat(m[1]),y:parseFloat(m[2]),k:parseFloat(m[3])};
                } else {
                  // Initial load: auto-zoom to show person's family at a comfortable scale
                  const z=newSvg.__zoom||{k:1,x:0,y:0};
                  const TARGET=0.85;
                  if(z.k < TARGET - 0.05){
                    const rect=fcWrap.getBoundingClientRect();
                    const vw=rect.width||900, vh=rect.height||600;
                    const ratio=TARGET/z.k;
                    const nx=vw/2-(vw/2-z.x)*ratio;
                    const ny=vh/2-(vh/2-z.y)*ratio;
                    mainG.setAttribute('transform','translate('+nx+','+ny+') scale('+TARGET+')');
                    newSvg.__zoom={x:nx,y:ny,k:TARGET};
                  }
                }
                // When renderRoot differs from the original focus person (i.e. we
                // rooted at a parent to expose siblings), highlight that person's card
                // so the user can identify them at a glance.
                if(renderRoot !== visibleFocusId){
                  fcWrap.querySelectorAll('g.card_cont').forEach(function(gEl){
                    const d=gEl.__data__;
                    if(d && d.data && d.data.id===visibleFocusId){
                      gEl.classList.add('f3-focus-person');
                    } else {
                      gEl.classList.remove('f3-focus-person');
                    }
                  });
                }

                // ── Mark past-relationship links (dashed + transparent) ──
                // Delay to run after D3 transitions complete (~1200ms)
                // so inline styles from the library are already set.
                setTimeout(function(){ _applyPastRelationshipStyles(fcWrap); }, 1400);
              });
            });
          }catch(err){
            console.error('Donatso render error:',err);
            fcWrap.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#e06060;font-size:14px;">Erro ao renderizar: '+_esc(err.message)+'</div>';
          }
          return;
        }

        /* ── Topola charts ─────────────────────────────────────────────── */
        document.getElementById('familyChartWrap').style.display='none';
        document.getElementById('topolaWrap').style.display='';
        f3ChartHandle=null;

        // Snapshot current viewbox before re-rendering so we can restore it
        const savedVb = preserveView ? {..._vb} : null;

        const json=buildTopolaJson();
        const svgEl=document.getElementById('topolaSvg');
        if(!json.indis.length){
          _chartSize=[800,400]; _vb={x:0,y:0,w:800,h:400};
          svgEl.setAttribute('viewBox','0 0 800 400');
          svgEl.innerHTML='<text x="400" y="200" text-anchor="middle" fill="#888" font-size="16">Sem dados. Adicione pessoas no Cadastro.</text>';
          return;
        }
        // Ensure startIndi exists in the current dataset; fall back to first person
        const validIds=new Set(json.indis.map(i=>i.id));
        if(!startIndi||!validIds.has(startIndi)) startIndi=json.indis[0].id;
        const chartType=CHART_TYPES[getChartType()]||T.HourglassChart;
        svgEl.removeAttribute('viewBox');
        svgEl.innerHTML=''; // clear
        try{
          chartHandle=T.createChart({
            json,
            chartType,
            renderer: T.DetailedRenderer,
            svgSelector: '#topolaSvg',
            indiCallback: function(info){ if(info&&info.id) openDrawer('edit',info.id); },
            animate: false,
            updateSvgSize: false,
            horizontal: false,
            locale: 'pt'
          });
          const info=chartHandle.render({startIndi:startIndi||undefined});
          _chartSize=info.size;
          _focusPt=[info.origin[0], info.origin[1]];
          if(savedVb){
            // Preserve the exact viewbox the user had before saving
            _vb=savedVb;
          } else {
            // Initial view: 1:1 scale centred on focus person
            const wrap=document.getElementById('topolaWrap');
            const W=wrap.clientWidth||900, H=wrap.clientHeight||600;
            _vb={x:_focusPt[0]-W/2, y:_focusPt[1]-H/2, w:W, h:H};
          }
          _applyViewBox();
        }catch(err){
          console.error('Topola render error:',err);
          _chartSize=[800,400]; _vb={x:0,y:0,w:800,h:400};
          svgEl.setAttribute('viewBox','0 0 800 400');
          svgEl.innerHTML='<text x="400" y="200" text-anchor="middle" fill="#e06060" font-size="14">Erro ao renderizar: '+_esc(err.message)+'</text>';
        }
      }

      /* ── Focus person ─────────────────────────────────────────────────── */
      function getFocusPersonId(){
        const validIds=new Set(DB.getIndividuals().map(i=>i.id));
        // Check temp setting (from Cadastro "Ver na Árvore")
        const temp=DB.getSetting('tempFocusPerson');
        if(temp){ DB.setSetting('tempFocusPerson',null); if(validIds.has(temp)) return temp; }
        // Check configured focus person — stored as {id, name, when} object
        const focused=DB.getSetting('focusedPerson');
        const focusedId=focused&&(typeof focused==='object'?focused.id:focused);
        if(focusedId && validIds.has(focusedId)) return focusedId;
        // Default: first individual
        const indis=DB.getIndividuals();
        return indis.length?indis[0].id:null;
      }

      // ── Searchable person combo ────────────────────────────────────
      let _allPersons=[];
      let _autoFocusId=null; // focus person from settings, used when nothing manually selected

      function populateFocusSelect(focusId){
        _allPersons=DB.getIndividuals().map(indi=>({id:indi.id,name:DB.getDisplayName(indi)}));
        _autoFocusId=focusId||null;
        // Leave input empty — search is user-initiated only
        document.getElementById('focusPersonSelect').value='';
        document.getElementById('focusPersonInput').value='';
        _renderDropdown('');
      }

      function _getSelectedOrFocusId(){
        const v=document.getElementById('focusPersonSelect').value;
        return v||_autoFocusId||(_allPersons.length?_allPersons[0].id:null);
      }

      function _renderDropdown(query){
        const dd=document.getElementById('focusPersonDropdown');
        const q=query.trim().toLowerCase();
        const filtered=q?_allPersons.filter(p=>p.name.toLowerCase().includes(q)):_allPersons;
        dd.innerHTML='';
        if(!filtered.length){
          dd.innerHTML='<div style="padding:8px 12px;color:var(--text-secondary);font-size:0.85rem;">Sem resultados</div>';
        } else {
          const hidden=document.getElementById('focusPersonSelect');
          filtered.forEach(p=>{
            const item=document.createElement('div');
            item.textContent=p.name;
            item.dataset.id=p.id;
            item.style.cssText='padding:7px 12px;cursor:pointer;font-size:0.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;';
            if(p.id===hidden.value) item.style.background='rgba(68,147,248,0.18)';
            item.addEventListener('mouseenter',()=>item.style.background='rgba(68,147,248,0.12)');
            item.addEventListener('mouseleave',()=>item.style.background=p.id===hidden.value?'rgba(68,147,248,0.18)':'');
            item.addEventListener('mousedown',e=>{
              e.preventDefault();
              _selectPerson(p.id,p.name);
            });
            dd.appendChild(item);
          });
        }
      }

      function _selectPerson(id,name){
        document.getElementById('focusPersonSelect').value=id;
        document.getElementById('focusPersonInput').value=name;
        document.getElementById('focusPersonDropdown').style.display='none';
      }

      (function _bindCombo(){
        const input=document.getElementById('focusPersonInput');
        const dd=document.getElementById('focusPersonDropdown');
        input.addEventListener('focus',()=>{ _renderDropdown(input.value); dd.style.display='block'; });
        input.addEventListener('input',()=>{ _renderDropdown(input.value); dd.style.display='block'; });
        input.addEventListener('blur',()=>{ setTimeout(()=>{ dd.style.display='none'; },150); });
        input.addEventListener('keydown',e=>{
          if(e.key==='Escape'){ dd.style.display='none'; input.blur(); }
          if(e.key==='Enter'){
            const first=dd.querySelector('[data-id]');
            if(first){ _selectPerson(first.dataset.id,first.textContent); input.blur(); }
          }
          if(e.key==='ArrowDown'){
            e.preventDefault();
            const items=[...dd.querySelectorAll('[data-id]')];
            if(items.length){ items[0].dispatchEvent(new MouseEvent('mousedown',{bubbles:true,cancelable:true})); }
          }
        });
      })();

      function showFocusInfo(){}

      /* ── Init ──────────────────────────────────────────────────────────── */
      const focusId=getFocusPersonId();
      populateFocusSelect(focusId);

      // Activate path mode if URL has pathFrom + pathTo (from Cadastro kinship badge)
      (function(){
        const p=new URLSearchParams(window.location.search);
        const pathFrom=p.get('pathFrom'), pathTo=p.get('pathTo');
        if (!pathFrom || !pathTo) { renderChart(focusId); return; }
        const filter=computePathFilter(pathFrom, pathTo);
        if (!filter || filter.indiSet.size < 2) { renderChart(focusId); return; }
        _pathFilter=filter;
        const nameFrom=DB.getDisplayName(DB.getIndividual(pathFrom))||pathFrom;
        const nameTo=DB.getDisplayName(DB.getIndividual(pathTo))||pathTo;
        const banner=document.getElementById('pathBanner');
        document.getElementById('pathBannerText').textContent=nameFrom+' \u2192 '+nameTo;
        banner.style.display='flex';
        renderChart(filter.startId);
      })();

      document.getElementById('clearPathBtn').addEventListener('click',function(){
        _pathFilter=null;
        document.getElementById('pathBanner').style.display='none';
        renderChart(_getSelectedOrFocusId());
      });

      document.getElementById('renderChartBtn').addEventListener('click',function(){
        _pathFilter=null;
        document.getElementById('pathBanner').style.display='none';
        const id=_getSelectedOrFocusId();
        renderChart(id);
      });

      document.getElementById('zoomInBtn').addEventListener('click',()=>_zoomViewBox(1/1.3));
      document.getElementById('openBookBtn').addEventListener('click', function() {
        // Use the person currently active/rendered in the tree view
        const personId = _getSelectedOrFocusId() || getFocusPersonId();
        const url = 'livro.html' + (personId ? '?person=' + encodeURIComponent(personId) : '');
        window.open(url, '_blank');
      });

      document.getElementById('resetFocusBtn').addEventListener('click',function(){
        _pathFilter=null;
        document.getElementById('pathBanner').style.display='none';
        // Re-read the configured focus person from settings at click time
        // (the user may have changed it in configuracao.html since page load)
        const validIds=new Set(DB.getIndividuals().map(i=>i.id));
        const focused=DB.getSetting('focusedPerson');
        const focusedId=focused&&(typeof focused==='object'?focused.id:focused);
        const id=(focusedId&&validIds.has(focusedId))?focusedId:
                 (DB.getIndividuals()[0]||{}).id||null;
        if(!id) return;
        const indi=DB.getIndividual(id);
        const name=indi?DB.getDisplayName(indi):'';
        // Update the combo to reflect the reset target
        document.getElementById('focusPersonSelect').value=id;
        document.getElementById('focusPersonInput').value=name;
        _autoFocusId=id;
        renderChart(id);
      });

      window.DRAWER_CONFIG = {
        treeBtnAction: function(personId) {
          window.closeDrawer();
          document.getElementById('focusPersonSelect').value = personId;
          var _indi = DB.getIndividual(personId);
          if (_indi) document.getElementById('focusPersonInput').value = DB.getDisplayName(_indi);
          renderChart(personId);
        },
        afterSave: function(savedId) {
          _updateEmptyState();
          populateFocusSelect(savedId);
          refreshChartInPlace();
        },
        afterDelete: function(deletedId) {
          var currentFocus = _getSelectedOrFocusId();
          var stillValid = DB.getIndividuals().find(function(i) { return i.id === currentFocus; });
          var newFocus = stillValid ? currentFocus : (DB.getIndividuals()[0] || {}).id || null;
          _updateEmptyState();
          populateFocusSelect(newFocus);
          refreshChartInPlace();
        }
      };

    })();
    </script>

    <script src="edit-person-drawer.js"></script>
    <script>
      (function() {
        document.getElementById('createFirstPersonBtn').addEventListener('click', function() {
          window.openDrawer('create', null);
        });
      })();
    </script>

    <script src="back-to-top.js"></script>
