# -----------------------------------------------------------------------------
#  myLineage — docker-compose.yml (desenvolvimento local / Windows)
# -----------------------------------------------------------------------------

services:

  postgres:
    image: postgres:16-alpine
    container_name: mylineage-db
    restart: unless-stopped

    environment:
      POSTGRES_DB: mylineage
      POSTGRES_USER: mylineage
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mylineage_dev}

    volumes:
      - pgdata:/var/lib/postgresql/data

    ports:
      - "5433:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mylineage"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mylineage:
    build:
      context: .
      dockerfile: Dockerfile
    image: mylineage:latest
    container_name: mylineage
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - "3000:3000"

    volumes:
      # Base de dados JSON — mantida para migração de dados legados
      - ./JSON-DATA:/app/JSON-DATA
      # Fotos e documentos descarregados do GEDCOM (persistência obrigatória)
      - ./uploads:/app/uploads

    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgres://mylineage:${POSTGRES_PASSWORD:-mylineage_dev}@postgres:5432/mylineage
      - JWT_SECRET=${JWT_SECRET:-change_me_in_production}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-miguel.bangueses@gmail.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - APP_URL=${APP_URL:-http://localhost:3000}
      - SMTP_HOST=${SMTP_HOST:-smtp.mailersend.net}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-MS_Vvnfir@test-nrw7gymwp9kg2k8e.mlsender.net}
      - SMTP_PASS=${SMTP_PASS:-mssp.jbtqhby.3z0vklo2jj747qrx.aQVTR35}
      - SMTP_FROM=${SMTP_FROM:-myLineage <MS_Vvnfir@test-nrw7gymwp9kg2k8e.mlsender.net>}

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  pgdata:
