<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>Biblioteca Histórica</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@latest/css/materialdesignicons.min.css">
    <script src="remote-storage.js"></script>
    <script src="auth.js"></script>
    <script src="notifications.js"></script>
    <script src="tree-switcher.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <style>
      .hist-table { width:100%; border-collapse:collapse; font-size:0.83rem; }
      .hist-table th { text-align:left; padding:8px 10px; border-bottom:1px solid rgba(255,255,255,0.08); color:var(--text-secondary); font-weight:600; }
      .hist-table td { padding:8px 10px; border-bottom:1px solid rgba(255,255,255,0.04); vertical-align:top; }
      .hist-table tr:hover td { background:rgba(255,255,255,0.02); }
      .pais-badge { display:inline-block; padding:2px 7px; border-radius:10px; font-size:0.75rem; font-weight:600; background:rgba(68,147,248,0.15); color:#4493f8; }
      .facto-cell { max-width:420px; }
      .facto-preview { display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; cursor:pointer; }
      .facto-preview.expanded { display:block; -webkit-line-clamp:unset; }
      .add-form-grid { display:grid; grid-template-columns:1fr 70px 70px 105px 105px; gap:10px; align-items:end; }
      @media(max-width:700px){ .add-form-grid { grid-template-columns:1fr 1fr; } }
      .titulo-cell { max-width:200px; }
      .form-field { display:flex; flex-direction:column; gap:4px; }
      .form-field label { font-size:0.75rem; color:var(--text-secondary); font-weight:600; }
      .form-field input, .form-field select, .form-field textarea {
        padding:6px 8px; border:1px solid var(--border); border-radius:4px;
        background:var(--bg-surface); color:var(--text-main); font-size:0.83rem;
      }
      .form-field textarea { resize:vertical; min-height:60px; }
      .empty-state { text-align:center; padding:40px 16px; color:var(--text-secondary); font-size:0.88rem; }

      /* Import progress overlay */
      .import-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:9999; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity .25s; pointer-events:none; }
      .import-overlay.visible { opacity:1; pointer-events:auto; }
      .import-card { background:var(--bg-surface); border:1px solid var(--border); border-radius:12px; padding:28px 32px; width:420px; max-width:92vw; box-shadow:0 8px 32px rgba(0,0,0,0.4); }
      .import-card h3 { margin:0 0 18px; font-size:1rem; color:var(--text-main); display:flex; align-items:center; gap:8px; }
      .import-card h3 .mdi { font-size:1.3rem; color:#4493f8; }
      .import-progress-bar { width:100%; height:8px; background:rgba(255,255,255,0.08); border-radius:4px; overflow:hidden; margin-bottom:14px; }
      .import-progress-fill { height:100%; width:0%; background:linear-gradient(90deg,#4493f8,#3fb950); border-radius:4px; transition:width .2s ease; }
      .import-stats { display:flex; gap:16px; margin-bottom:10px; font-size:0.82rem; }
      .import-stat { display:flex; align-items:center; gap:5px; color:var(--text-secondary); }
      .import-stat .val { font-weight:700; font-size:0.92rem; }
      .import-stat.ok .val { color:#3fb950; }
      .import-stat.err .val { color:#f05252; }
      .import-status { font-size:0.8rem; color:var(--text-secondary); margin-bottom:16px; min-height:1.2em; }
      .import-status .mdi-spin { margin-right:4px; }
      .import-close { display:none; width:100%; padding:8px; border:none; border-radius:6px; background:#4493f8; color:#fff; font-size:0.85rem; font-weight:600; cursor:pointer; transition:background .15s; }
      .import-close:hover { background:#3a82e0; }
      .import-close.show { display:block; }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <a href="index.html" class="logo"><i class="mdi mdi-tree" aria-hidden="true"></i><span>myLineage</span></a>
        <nav>
          <a href="app.html"><i class="mdi mdi-account-multiple" aria-hidden="true"></i>Cadastro</a>
          <a href="indicadores.html"><i class="mdi mdi-chart-bar" aria-hidden="true"></i>Indicadores</a>
          <a href="arvore.html"><i class="mdi mdi-sitemap" aria-hidden="true"></i>Árvore</a>
          <a href="album.html"><i class="mdi mdi-image-multiple" aria-hidden="true"></i>Álbum</a>
          <a href="documentos.html"><i class="mdi mdi-folder-open" aria-hidden="true"></i>Documentos</a>
          <a href="validacao.html"><i class="mdi mdi-shield-check" aria-hidden="true"></i>Validação</a>
          <a href="historico.html"><i class="mdi mdi-history" aria-hidden="true"></i>Histórico</a>
        </nav>
        <div class="sidebar-footer">
          <a href="tree-settings.html"><i class="mdi mdi-cog-transfer-outline" aria-hidden="true"></i>Árvore</a>
          <a href="apis.html"><i class="mdi mdi-api" aria-hidden="true"></i>APIs</a>
          <a href="configuracao.html" class="active"><i class="mdi mdi-cog" aria-hidden="true"></i>Definições</a>
        </div>
      </aside>
      <main class="content">
        <div class="topbar">
          <div>
            <a href="configuracao.html" style="font-size:0.8rem;color:var(--text-secondary);text-decoration:none;margin-bottom:4px;display:inline-block;">
              <i class="mdi mdi-arrow-left"></i> Voltar às Definições
            </a>
            <h1>Biblioteca Histórica</h1>
          </div>
          <div></div>
        </div>

        <!-- Add form -->
        <div class="card centered-panel" style="max-width:900px;width:100%;padding-bottom:20px;">
          <h2 style="margin:0 0 14px;font-size:1rem;" id="formTitle"><i class="mdi mdi-plus-circle-outline" style="color:#4493f8;margin-right:8px;" id="formIcon"></i><span id="formTitleText">Adicionar facto histórico</span></h2>
          <div class="add-form-grid" id="addFormGrid">
            <div class="form-field">
              <label>País *</label>
              <input type="text" id="fPais" list="fPaisDatalist" autocomplete="off" placeholder="Escreva para procurar..." />
              <datalist id="fPaisDatalist"></datalist>
            </div>
            <div class="form-field">
              <label>Dia</label>
              <input type="number" id="fDia" placeholder="(opt.)" min="1" max="31" />
            </div>
            <div class="form-field">
              <label>Mês</label>
              <input type="number" id="fMes" placeholder="(opt.)" min="1" max="12" />
            </div>
            <div class="form-field">
              <label>Ano início *</label>
              <input type="text" id="fAnoInicio" placeholder="ex. 1910 ou c. 700 a.C." />
            </div>
            <div class="form-field">
              <label>Ano fim</label>
              <input type="text" id="fAnoFim" placeholder="(opt.)" />
            </div>
          </div>
          <div class="form-field" style="margin-top:10px;">
            <label>Título</label>
            <input type="text" id="fTitulo" placeholder="Título curto do facto (opcional)" />
          </div>
          <div class="form-field" style="margin-top:10px;">
            <label>Descrição *</label>
            <textarea id="fFacto" placeholder="Texto descritivo do facto histórico..." rows="3"></textarea>
          </div>
          <div style="margin-top:12px;display:flex;gap:8px;align-items:center;">
            <button class="btn btn-ghost btn-sm" id="addBtn"><i class="mdi mdi-check"></i> Adicionar</button>
            <button class="btn btn-ghost btn-sm" id="cancelEditBtn" style="display:none;"><i class="mdi mdi-close"></i> Cancelar</button>
            <span id="addMsg" style="font-size:0.78rem;color:var(--text-secondary);"></span>
          </div>
        </div>

        <!-- Facts list -->
        <div class="card centered-panel" style="max-width:900px;width:100%;margin-top:16px;padding-bottom:20px;">
          <div style="margin-bottom:14px;">
            <h2 style="margin:0 0 10px;font-size:1rem;"><i class="mdi mdi-text-box-multiple-outline" style="color:#4493f8;margin-right:8px;"></i>Factos registados</h2>
            <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
              <input type="search" id="filterInput" placeholder="Filtrar..." style="padding:5px 8px;border:1px solid var(--border);border-radius:4px;background:var(--bg-surface);color:var(--text-main);font-size:0.8rem;width:160px;" />
              <input type="text" id="filterPais" list="filterPaisDatalist" autocomplete="off" placeholder="País..." style="padding:5px 8px;border:1px solid var(--border);border-radius:4px;background:var(--bg-surface);color:var(--text-main);font-size:0.8rem;width:130px;" />
              <datalist id="filterPaisDatalist"></datalist>
              <span id="countBadge" style="font-size:0.78rem;color:var(--text-secondary);white-space:nowrap;"></span>
              <button class="btn btn-ghost btn-sm" id="exportBtn" title="Exportar para Excel"><i class="mdi mdi-microsoft-excel"></i> Exportar</button>
              <button class="btn btn-ghost btn-sm" id="importBtn" title="Importar de Excel"><i class="mdi mdi-upload"></i> Importar</button>
              <input type="file" id="importFile" accept=".xlsx,.xls,.ods,.csv" style="display:none;" />
              <button class="btn btn-ghost btn-sm" id="deleteAllBtn" title="Apagar todos os factos" style="color:#f05252;"><i class="mdi mdi-delete-sweep-outline"></i> Apagar todos</button>

            </div>
          </div>
          <div id="listArea"><div class="empty-state"><i class="mdi mdi-loading mdi-spin"></i> A carregar...</div></div>

          <!-- Import progress overlay -->
          <div class="import-overlay" id="importOverlay">
            <div class="import-card">
              <h3><i class="mdi mdi-upload"></i> Importação de Excel</h3>
              <div class="import-progress-bar"><div class="import-progress-fill" id="importProgressFill"></div></div>
              <div class="import-stats">
                <span class="import-stat ok"><i class="mdi mdi-check-circle-outline"></i> Importados: <span class="val" id="importDone">0</span></span>
                <span class="import-stat err"><i class="mdi mdi-alert-circle-outline"></i> Ignorados: <span class="val" id="importErrs">0</span></span>
                <span class="import-stat"><i class="mdi mdi-file-document-outline"></i> Total: <span class="val" id="importTotal">0</span></span>
              </div>
              <div class="import-status" id="importStatus"></div>
              <button class="import-close" id="importClose">Fechar</button>
            </div>
          </div>
        </div>

      </main>
    </div>

    <script>
    (function () {
      'use strict';

      var TREE_KEY = 'ml_current_tree';
      var LEGACY_TREE_ID = '00000000-0000-0000-0000-000000000000';
      var treeId = localStorage.getItem(TREE_KEY) || LEGACY_TREE_ID;
      function authHeaders(extra) {
        var tk = localStorage.getItem('ml_access') || '';
        var h = Object.assign({ 'Content-Type': 'application/json' }, extra || {});
        if (tk) h['Authorization'] = 'Bearer ' + tk;
        return h;
      }
      function apiUrl(suffix) { return '/api/trees/' + treeId + '/historical-facts' + (suffix || ''); }

      let allFacts = [];
      let editingId = null;

      /* Full country list — matches edit-person-drawer.js */
      var COUNTRY_LIST = ['Mundial','Portugal','Brasil','Angola','Moçambique','Cabo Verde','Guiné-Bissau',
        'São Tomé e Príncipe','Timor-Leste','Macau','Espanha','Alemanha','França',
        'Reino Unido','Itália','Países Baixos','Bélgica','Suíça','Áustria','Suécia',
        'Noruega','Dinamarca','Finlândia','Polónia','República Checa','Hungria',
        'Roménia','Grécia','Irlanda','Luxemburgo','Rússia','Ucrânia',
        'Estados Unidos','Canadá','Argentina','Chile','Peru','Colômbia','Venezuela',
        'Uruguai','Paraguai','Bolívia','Equador','México','África do Sul',
        'Marrocos','Egito','Nigéria','Quénia','Etiópia','Ghana','Senegal',
        'China','Índia','Japão','Coreia do Sul','Austrália','Nova Zelândia',
        'Indonésia','Vietname','Tailândia','Singapura'];

      /* Backward compat — normalise old codes to full names */
      var LEGACY_MAP = { 'PT':'Portugal', 'ES':'Espanha', 'WORLD':'Mundial' };
      function normPais(v) { return LEGACY_MAP[v] || v || 'Mundial'; }

      function populateCountrySelects() {
        var opts = COUNTRY_LIST.map(function(c) { return '<option value="' + c + '">'; }).join('');
        document.getElementById('fPaisDatalist').innerHTML = opts;
        document.getElementById('filterPaisDatalist').innerHTML = opts;
        document.getElementById('fPais').value = '';
      }
      populateCountrySelects();

      function sortFactsDesc(arr) {
        arr.sort((a,b) => {
          const ya = +a.anoInicio || 0, yb = +b.anoInicio || 0;
          if (ya !== yb) return yb - ya;
          const ma = +a.mes || 0, mb = +b.mes || 0;
          if (ma !== mb) return mb - ma;
          return (+b.dia || 0) - (+a.dia || 0);
        });
      }

      function escHtml(s) {
        return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      }

      function loadFacts() {
        fetch(apiUrl(), { headers: authHeaders({}) })
          .then(r => r.ok ? r.json() : Promise.reject(r.status))
          .then(data => {
            allFacts = (data || []).filter(n => !n.deletedAt);
            allFacts.forEach(n => { n.pais = normPais(n.pais); });
            sortFactsDesc(allFacts);
            renderList();
          })
          .catch(err => {
            document.getElementById('listArea').innerHTML =
              '<div class="empty-state"><i class="mdi mdi-alert-circle-outline"></i> Erro ao carregar factos: ' + escHtml(err) + '</div>';
          });
      }

      function renderList() {
        const q = (document.getElementById('filterInput').value || '').toLowerCase();
        const pFilter = document.getElementById('filterPais').value.trim();
        const filtered = allFacts.filter(n => {
          if (pFilter && (n.pais || '') !== pFilter) return false;
          if (q && !(n.facto || '').toLowerCase().includes(q) && !(n.titulo || '').toLowerCase().includes(q)) return false;
          return true;
        });

        /* Keep the filter datalist up-to-date with actual countries in data */
        const allCountries = [...new Set(allFacts.map(n => n.pais || '').filter(Boolean))].sort();
        const datalistEl = document.getElementById('filterPaisDatalist');
        datalistEl.innerHTML = allCountries.map(function(c) { return '<option value="' + escHtml(c) + '">'; }).join('');

        document.getElementById('countBadge').textContent = filtered.length + ' facto' + (filtered.length !== 1 ? 's' : '');

        if (!filtered.length) {
          document.getElementById('listArea').innerHTML = '<div class="empty-state"><i class="mdi mdi-emoticon-sad-outline"></i> Nenhum facto encontrado.</div>';
          return;
        }

        let html = '<div style="overflow-x:auto;"><table class="hist-table"><thead><tr>' +
          '<th>País</th><th>Dia</th><th>Mês</th><th>Ano</th><th>Título</th><th class="facto-cell">Descrição</th><th></th>' +
          '</tr></thead><tbody>';

        filtered.forEach(n => {
          const ano = (n.anoFim && n.anoFim !== n.anoInicio)
            ? escHtml(n.anoInicio) + '–' + escHtml(n.anoFim)
            : escHtml(n.anoInicio || '—');
          html += `<tr data-id="${escHtml(n.id)}">
            <td><span class="pais-badge">${escHtml(n.pais)}</span></td>
            <td>${escHtml(n.dia || '—')}</td>
            <td>${escHtml(n.mes || '—')}</td>
            <td style="white-space:nowrap;">${ano}</td>
            <td class="titulo-cell">${escHtml(n.titulo || '')}</td>
            <td class="facto-cell">
              <div class="facto-preview" title="Clique para expandir">${escHtml(n.facto)}</div>
            </td>
            <td style="white-space:nowrap;">
              <button class="btn btn-ghost btn-sm edit-btn" data-id="${escHtml(n.id)}" title="Editar facto">
                <i class="mdi mdi-pencil-outline"></i>
              </button>
              <button class="btn btn-ghost btn-sm del-btn" data-id="${escHtml(n.id)}" title="Apagar facto">
                <i class="mdi mdi-delete-outline"></i>
              </button>
            </td>
          </tr>`;
        });

        html += '</tbody></table></div>';
        document.getElementById('listArea').innerHTML = html;

        // expand on click
        document.querySelectorAll('.facto-preview').forEach(el => {
          el.addEventListener('click', function() { this.classList.toggle('expanded'); });
        });

        // edit buttons
        document.querySelectorAll('.edit-btn').forEach(btn => {
          btn.addEventListener('click', function() {
            const id = this.getAttribute('data-id');
            const fact = allFacts.find(f => f.id === id);
            if (!fact) return;
            editingId = id;
            document.getElementById('fPais').value = normPais(fact.pais);
            document.getElementById('fDia').value = fact.dia != null ? fact.dia : '';
            document.getElementById('fMes').value = fact.mes != null ? fact.mes : '';
            document.getElementById('fAnoInicio').value = fact.anoInicio != null ? fact.anoInicio : '';
            document.getElementById('fAnoFim').value = fact.anoFim != null ? fact.anoFim : '';
            document.getElementById('fTitulo').value = fact.titulo || '';
            document.getElementById('fFacto').value = fact.facto || '';
            document.getElementById('formIcon').className = 'mdi mdi-pencil-outline';
            document.getElementById('formIcon').style.color = '#d29922';
            document.getElementById('formTitleText').textContent = 'Editar facto histórico';
            document.getElementById('addBtn').innerHTML = '<i class="mdi mdi-check"></i> Guardar alterações';
            document.getElementById('cancelEditBtn').style.display = '';
            document.getElementById('addMsg').textContent = '';
            document.querySelector('.card.centered-panel').scrollIntoView({ behavior: 'smooth' });
          });
        });

        // delete buttons
        document.querySelectorAll('.del-btn').forEach(btn => {
          btn.addEventListener('click', function() {
            const id = this.getAttribute('data-id');
            if (!confirm('Apagar este facto histórico?\n\nEsta ação não pode ser desfeita.')) return;
            fetch(apiUrl('/' + encodeURIComponent(id)), { method: 'DELETE', headers: authHeaders({}) })
              .then(r => r.ok ? r.json() : Promise.reject(r.status))
              .then(() => {
                allFacts = allFacts.filter(n => n.id !== id);
                renderList();
              })
              .catch(err => alert('Erro ao apagar: ' + err));
          });
        });
      }

      document.getElementById('filterInput').addEventListener('input', renderList);
      document.getElementById('filterPais').addEventListener('input', renderList);
      document.getElementById('filterPais').addEventListener('change', renderList);

      document.getElementById('deleteAllBtn').addEventListener('click', function() {
        if (!allFacts.length) return;
        if (!confirm('Tem a certeza que pretende apagar TODOS os ' + allFacts.length + ' factos históricos?\n\nEsta ação não pode ser desfeita.')) return;
        const overlay  = document.getElementById('importOverlay');
        const fill     = document.getElementById('importProgressFill');
        const elDone   = document.getElementById('importDone');
        const elErrs   = document.getElementById('importErrs');
        const elTotal  = document.getElementById('importTotal');
        const elStatus = document.getElementById('importStatus');
        const elClose  = document.getElementById('importClose');
        const elTitle  = overlay.querySelector('h3');
        elTitle.innerHTML = '<i class="mdi mdi-delete-sweep-outline" style="color:#f05252"></i> A apagar factos';
        fill.style.width = '0%'; elDone.textContent = '0'; elErrs.textContent = '0';
        elTotal.textContent = allFacts.length;
        elStatus.innerHTML = '<i class="mdi mdi-loading mdi-spin"></i> A apagar ' + allFacts.length + ' facto(s)...';
        elClose.classList.remove('show');
        overlay.classList.add('visible');

        const ids = allFacts.map(f => f.id);
        const total = ids.length;
        let done = 0, errs = 0;
        function updateProgress() {
          fill.style.width = Math.round(((done + errs) / total) * 100) + '%';
          elDone.textContent = done; elErrs.textContent = errs;
        }
        Promise.all(ids.map(id =>
          fetch(apiUrl('/' + encodeURIComponent(id)), { method: 'DELETE', headers: authHeaders({}) })
            .then(r => { if (r.ok) done++; else errs++; updateProgress(); })
            .catch(() => { errs++; updateProgress(); })
        )).then(() => {
          fill.style.width = '100%';
          allFacts = [];
          if (errs) {
            elStatus.innerHTML = '<i class="mdi mdi-alert-circle" style="color:#f05252"></i> Apagados: ' + done + ' | Erros: ' + errs;
            loadFacts();
          } else {
            elStatus.innerHTML = '<i class="mdi mdi-check-circle" style="color:#3fb950"></i> Todos os factos foram apagados.';
          }
          elClose.classList.add('show');
          elTitle.innerHTML = '<i class="mdi mdi-delete-sweep-outline" style="color:#f05252"></i> Remoção concluída';
          resetForm();
          renderList();
        });
      });

      function resetForm() {
        editingId = null;
        document.getElementById('fPais').value = '';
        document.getElementById('fDia').value = '';
        document.getElementById('fMes').value = '';
        document.getElementById('fAnoInicio').value = '';
        document.getElementById('fAnoFim').value = '';
        document.getElementById('fTitulo').value = '';
        document.getElementById('fFacto').value = '';
        document.getElementById('formIcon').className = 'mdi mdi-plus-circle-outline';
        document.getElementById('formIcon').style.color = '#4493f8';
        document.getElementById('formTitleText').textContent = 'Adicionar facto histórico';
        document.getElementById('addBtn').innerHTML = '<i class="mdi mdi-check"></i> Adicionar';
        document.getElementById('cancelEditBtn').style.display = 'none';
        document.getElementById('addMsg').textContent = '';
      }

      document.getElementById('cancelEditBtn').addEventListener('click', resetForm);

      document.getElementById('addBtn').addEventListener('click', function() {
        const dia = document.getElementById('fDia').value.trim();
        const mes = document.getElementById('fMes').value.trim();
        const anoInicio = document.getElementById('fAnoInicio').value.trim();
        const anoFim = document.getElementById('fAnoFim').value.trim();
        const pais = document.getElementById('fPais').value.trim();
        const titulo = document.getElementById('fTitulo').value.trim();
        const facto = document.getElementById('fFacto').value.trim();
        const msg = document.getElementById('addMsg');

        if (!pais) { msg.textContent = 'O país é obrigatório.'; msg.style.color = '#f05252'; return; }
        if (!anoInicio) { msg.textContent = 'O ano de início é obrigatório.'; msg.style.color = '#f05252'; return; }
        if (!facto) { msg.textContent = 'O texto do facto é obrigatório.'; msg.style.color = '#f05252'; return; }

        function smartYear(v) { var n = +v; return (v !== '' && !isNaN(n)) ? n : v; }
        const body = {
          dia: dia ? +dia : null,
          mes: mes ? +mes : null,
          anoInicio: smartYear(anoInicio),
          anoFim: anoFim ? smartYear(anoFim) : null,
          pais,
          titulo,
          facto
        };

        msg.textContent = 'A guardar...'; msg.style.color = 'var(--text-secondary)';

        if (editingId) {
          // ── UPDATE existing fact via PUT ──
          fetch(apiUrl('/' + encodeURIComponent(editingId)), {
            method: 'PUT',
            headers: authHeaders(),
            body: JSON.stringify(body)
          })
            .then(r => r.ok ? r.json() : Promise.reject(r.status))
            .then(updated => {
              const idx = allFacts.findIndex(f => f.id === editingId);
              if (idx >= 0) allFacts[idx] = updated; else allFacts.push(updated);
              sortFactsDesc(allFacts);
              resetForm();
              msg.textContent = 'Facto atualizado!'; msg.style.color = '#3fb950';
              setTimeout(() => { msg.textContent = ''; }, 3000);
              renderList();
            })
            .catch(err => { msg.textContent = 'Erro ao atualizar: ' + err; msg.style.color = '#f05252'; });
          return;
        }

        // ── CREATE new fact via POST ──
        fetch(apiUrl(), {
          method: 'POST',
          headers: authHeaders(),
          body: JSON.stringify(body)
        })
          .then(r => r.ok ? r.json() : Promise.reject(r.status))
          .then(created => {
            allFacts.push(created);
            sortFactsDesc(allFacts);
            resetForm();
            msg.textContent = 'Facto adicionado!'; msg.style.color = '#3fb950';
            setTimeout(() => { msg.textContent = ''; }, 3000);
            renderList();
          })
          .catch(err => { msg.textContent = 'Erro ao guardar: ' + err; msg.style.color = '#f05252'; });
      });

      function exportExcel() {
        if (!window.XLSX) { alert('Módulo Excel não carregado.'); return; }
        const rows = [['País', 'Dia', 'Mês', 'Ano Início', 'Ano Fim', 'Título', 'Descrição']];
        allFacts.forEach(n => {
          rows.push([
            n.pais || '',
            n.dia != null ? n.dia : '',
            n.mes != null ? n.mes : '',
            n.anoInicio != null ? n.anoInicio : '',
            n.anoFim != null ? n.anoFim : '',
            n.titulo || '',
            n.facto || ''
          ]);
        });
        const ws = XLSX.utils.aoa_to_sheet(rows);
        ws['!cols'] = [{wch:8},{wch:5},{wch:5},{wch:11},{wch:9},{wch:36},{wch:80}];
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Factos Históricos');
        XLSX.writeFile(wb, 'factos-historicos.xlsx');
      }

      function importExcel(file) {
        if (!window.XLSX) { alert('Módulo Excel não carregado.'); return; }
        const overlay = document.getElementById('importOverlay');
        const fill    = document.getElementById('importProgressFill');
        const elDone  = document.getElementById('importDone');
        const elErrs  = document.getElementById('importErrs');
        const elTotal = document.getElementById('importTotal');
        const elStatus= document.getElementById('importStatus');
        const elClose = document.getElementById('importClose');

        // reset & show
        fill.style.width = '0%'; elDone.textContent = '0'; elErrs.textContent = '0'; elTotal.textContent = '0';
        elStatus.innerHTML = '<i class="mdi mdi-loading mdi-spin"></i> A ler ficheiro...';
        elClose.classList.remove('show');
        overlay.classList.add('visible');

        const isCsv = /\.(csv|tsv|txt)$/i.test(file.name);

        function processWorkbook(wb) {
          try {
            const ws = wb.Sheets[wb.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
            if (rows.length < 2) {
              elStatus.innerHTML = '<i class="mdi mdi-alert-circle" style="color:#f05252"></i> Ficheiro sem dados.';
              elClose.classList.add('show'); return;
            }
            const norm = s => String(s||'').trim().toLowerCase()
              .replace(/á|à|â|ã/g,'a').replace(/é|è|ê/g,'e').replace(/í|ì|î/g,'i')
              .replace(/ó|ò|ô|õ/g,'o').replace(/ú|ù|û/g,'u').replace(/ç/g,'c').replace(/ñ/g,'n');
            const h = rows[0].map(norm);
            const col = (...kws) => { for(const k of kws){ const i = h.findIndex(s => s.includes(k)); if(i>=0) return i; } return -1; };
            const pos = (v, fb) => v >= 0 ? v : fb;
            const C = {
              pais:      pos(col('pais','country'), 0),
              dia:       pos(col('dia','day'), 1),
              mes:       pos(col('mes','month'), 2),
              anoInicio: pos(col('inicio','start'), 3),
              anoFim:    pos(col('fim','end'), 4),
              titulo:    pos(col('titulo','title'), 5),
              facto:     pos(col('descri','facto','description','text'), 6)
            };
            const dataRows = rows.slice(1).filter(r => r.some(c => String(c).trim() !== ''));
            if (!dataRows.length) {
              elStatus.innerHTML = '<i class="mdi mdi-alert-circle" style="color:#f05252"></i> Nenhuma linha de dados.';
              elClose.classList.add('show'); return;
            }
            const total = dataRows.length;
            elTotal.textContent = total;
            elStatus.innerHTML = '<i class="mdi mdi-loading mdi-spin"></i> A importar ' + total + ' linha(s)...';
            let done = 0, errs = 0;

            function updateProgress() {
              const pct = Math.round(((done + errs) / total) * 100);
              fill.style.width = pct + '%';
              elDone.textContent = done;
              elErrs.textContent = errs;
            }

            /* Resolve raw country string — tries known entries first, falls back to the raw value */
            function resolvePais(raw) {
              var v = String(raw || '').trim();
              if (!v) return 'Mundial';
              /* exact match */
              if (COUNTRY_LIST.includes(v)) return v;
              /* case-insensitive match */
              var lower = v.toLowerCase();
              var found = COUNTRY_LIST.find(function(c) { return c.toLowerCase() === lower; });
              if (found) return found;
              /* legacy 2-letter codes */
              var legacyMap = { 'PT': 'Portugal', 'ES': 'Espanha', 'BR': 'Brasil',
                'AO': 'Angola', 'MZ': 'Moçambique', 'CV': 'Cabo Verde', 'GW': 'Guiné-Bissau',
                'ST': 'São Tomé e Príncipe', 'TL': 'Timor-Leste', 'US': 'Estados Unidos',
                'GB': 'Reino Unido', 'FR': 'França', 'DE': 'Alemanha', 'IT': 'Itália',
                'WORLD': 'Mundial', 'WLD': 'Mundial' };
              var upper = v.toUpperCase();
              if (legacyMap[upper]) return legacyMap[upper];
              /* accent-normalised match */
              var normStr = lower.replace(/[áàâã]/g,'a').replace(/[éèê]/g,'e')
                .replace(/[íìî]/g,'i').replace(/[óòôõ]/g,'o')
                .replace(/[úùû]/g,'u').replace(/ç/g,'c').replace(/ñ/g,'n');
              found = COUNTRY_LIST.find(function(c) {
                var cn = c.toLowerCase().replace(/[áàâã]/g,'a').replace(/[éèê]/g,'e')
                  .replace(/[íìî]/g,'i').replace(/[óòôõ]/g,'o')
                  .replace(/[úùû]/g,'u').replace(/ç/g,'c').replace(/ñ/g,'n');
                return cn === normStr;
              });
              /* free-text: keep the raw value as-is if nothing matched */
              return found || v;
            }

            /* Smart year: numeric if parseable, otherwise keep as free-text string */
            function smartYear(raw) {
              var s = String(raw || '').trim();
              if (s === '') return null;
              var n = +s;
              return !isNaN(n) ? n : s;
            }

            /* Sequential import — avoids concurrent ID collisions on the server */
            var rowQueue = dataRows.slice();
            function importNext() {
              if (!rowQueue.length) {
                sortFactsDesc(allFacts);
                fill.style.width = '100%';
                if (errs && !done) {
                  elStatus.innerHTML = '<i class="mdi mdi-alert-circle" style="color:#f05252"></i> Nenhum registo importado.';
                } else {
                  elStatus.innerHTML = '<i class="mdi mdi-check-circle" style="color:#3fb950"></i> Importação concluída!';
                }
                elClose.classList.add('show');
                document.getElementById('importFile').value = '';
                renderList();
                return;
              }
              var row = rowQueue.shift();
              var anoInicio = smartYear(row[C.anoInicio]);
              var facto = String(row[C.facto]||'').trim();
              if (!facto || anoInicio === null || anoInicio === '') { errs++; updateProgress(); importNext(); return; }
              var body = {
                pais: resolvePais(row[C.pais]),
                dia:  String(row[C.dia]).trim() !== '' ? (+row[C.dia] || null) : null,
                mes:  String(row[C.mes]).trim() !== '' ? (+row[C.mes] || null) : null,
                anoInicio,
                anoFim: smartYear(row[C.anoFim]),
                titulo: String(row[C.titulo]||'').trim(),
                facto
              };
              fetch(apiUrl(), {
                method: 'POST', headers: authHeaders(),
                body: JSON.stringify(body)
              }).then(function(r) { return r.ok ? r.json() : null; })
                .then(function(c) { if (c) { allFacts.push(c); done++; } else errs++; updateProgress(); importNext(); })
                .catch(function() { errs++; updateProgress(); importNext(); });
            }
            importNext();
          } catch(err) {
            elStatus.innerHTML = '<i class="mdi mdi-alert-circle" style="color:#f05252"></i> Erro: ' + err;
            elClose.classList.add('show');
          }
        }

        if (isCsv) {
          /* CSV/TSV: detect encoding — try UTF-8 first, fall back to Windows-1252 */
          var reader = new FileReader();
          reader.onload = function(e) {
            var text = e.target.result;
            if (text.indexOf('\ufffd') !== -1) {
              /* UTF-8 produced replacement chars → re-read as Windows-1252 (typical Portuguese Excel) */
              var r2 = new FileReader();
              r2.onload = function(ev) {
                processWorkbook(XLSX.read(ev.target.result, { type: 'string' }));
              };
              r2.readAsText(file, 'windows-1252');
            } else {
              processWorkbook(XLSX.read(text, { type: 'string' }));
            }
          };
          reader.readAsText(file, 'utf-8');
        } else {
          /* XLSX / XLS / ODS: binary format, encoding is embedded */
          var reader = new FileReader();
          reader.onload = function(e) {
            processWorkbook(XLSX.read(e.target.result, { type: 'array', codepage: 65001 }));
          };
          reader.readAsArrayBuffer(file);
        }
      }

      document.getElementById('exportBtn').addEventListener('click', exportExcel);
      document.getElementById('importBtn').addEventListener('click', () => document.getElementById('importFile').click());
      document.getElementById('importFile').addEventListener('change', function() {
        if (this.files && this.files[0]) importExcel(this.files[0]);
      });
      document.getElementById('importClose').addEventListener('click', () => {
        document.getElementById('importOverlay').classList.remove('visible');
      });

      loadFacts();
    })();
    </script>
    <script src="back-to-top.js"></script>
  </body>
